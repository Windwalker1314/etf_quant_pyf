<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ETF Quant</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">PYF</span>
          <div>
            <h1>PYF Quant</h1>
            <p>全球 ETF 实盘工作台</p>
          </div>
        </div>

        <label class="field">
          <span>当前策略</span>
          <select id="strategySelect"></select>
        </label>

        <div class="meta-list" id="strategyMeta"></div>

        <div class="settings">
          <label class="field compact">
            <span>整手数量</span>
            <input id="lotSizeInput" type="number" min="1" step="1" value="100" />
          </label>
          <label class="field compact">
            <span>最小交易额</span>
            <input id="minTradeInput" type="number" min="0" step="100" value="0" />
          </label>
          <label class="toggle-row">
            <input id="refreshInput" type="checkbox" checked />
            <span>触发前刷新行情</span>
          </label>
        </div>
      </aside>

      <main class="main">
        <section class="topbar">
          <div>
            <p class="eyebrow">PYF Live Plan</p>
            <h2 id="pageTitle">策略调仓计划</h2>
          </div>
          <div class="actions">
            <button class="secondary" id="savePositionsButton" type="button" title="保存持仓">保存持仓</button>
            <button class="primary" id="generateButton" type="button" title="生成调仓计划">生成计划</button>
          </div>
        </section>

        <section class="summary-grid">
          <div class="metric">
            <span>数据日期</span>
            <strong id="asOfDate">-</strong>
          </div>
          <div class="metric">
            <span>组合市值</span>
            <strong id="portfolioValue">-</strong>
          </div>
          <div class="metric">
            <span>现金</span>
            <strong id="cashValue">-</strong>
          </div>
          <div class="metric">
            <span>交易数量</span>
            <strong id="tradeCount">-</strong>
          </div>
        </section>

        <section class="panel backtest-panel">
          <div class="panel-head">
            <div>
              <h3>近年回测曲线</h3>
              <p id="backtestHint">读取策略输出中的最近 5 年净值</p>
            </div>
            <div class="backtest-stats">
              <div><span>年化</span><strong id="btAnnual">-</strong></div>
              <div><span>夏普</span><strong id="btSharpe">-</strong></div>
              <div><span>回撤</span><strong id="btDrawdown">-</strong></div>
            </div>
          </div>
          <canvas id="equityChart" width="1100" height="320"></canvas>
        </section>

        <section class="work-grid">
          <div class="panel holdings-panel">
            <div class="panel-head">
              <div>
                <h3>当前持仓</h3>
                <p id="positionsPath">-</p>
              </div>
              <label class="cash-field">
                <span>可用现金</span>
                <input id="cashInput" type="number" step="0.01" />
              </label>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>代码</th>
                    <th>名称</th>
                    <th class="num">份额</th>
                  </tr>
                </thead>
                <tbody id="holdingsBody"></tbody>
              </table>
            </div>
          </div>

          <div class="panel chart-panel">
            <div class="panel-head">
              <div>
                <h3>目标权重</h3>
                <p id="chartHint">等待生成计划</p>
              </div>
            </div>
            <canvas id="weightChart" width="620" height="360"></canvas>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <h3>调仓动作</h3>
              <p id="orderHint">尚未生成今日计划</p>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>代码</th>
                  <th>方向</th>
                  <th class="num">交易份额</th>
                  <th class="num">估算价格</th>
                  <th class="num">估算金额</th>
                  <th class="num">目标权重</th>
                </tr>
              </thead>
              <tbody id="ordersBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
</html>
