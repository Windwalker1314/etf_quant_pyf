  - symbol: 513100.SH
    name: 纳指ETF
    asset_class: us_equity
    currency: CNY
  - symbol: 159985.SZ
    name: 豆粕ETF
    asset_class: commodity
    currency: CNY
  - symbol: 513500.SH
    name: 标普500ETF
    asset_class: us_equity
    currency: CNY
  - symbol: 518880.SH
    name: 黄金ETF
    asset_class: commodity
    currency: CNY
  - symbol: 513130.SH
    name: 恒生科技ETF
    asset_class: hk_equity
    currency: CNY
  - symbol: 510300.SH
    name: 沪深300ETF
    asset_class: cn_equity
    currency: CNY
  - symbol: 159915.SZ
    name: 创业板ETF
    asset_class: cn_equity
