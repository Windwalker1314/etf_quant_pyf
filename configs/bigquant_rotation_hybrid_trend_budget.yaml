    currency: CNY

data:
  source: csv
  path: ../data/raw/bigquant_hybrid_prices.csv
  start: "2020-01-01"
  end: "2026-05-11"

factors:
  - name: bigquant_rotation
    params:
      trend_period: 25
      inv_vol_window: 30
      weight_clip_pct: 0.90

strategy:
  name: bigquant_rotation
  params:
    hold_num: 2
    rebalance_weekday: null
    score_gap_base: 0.10
    gap_coef: 0.35
    gap_floor: 0.10
    change_threshold: 0.12
    trail_stop_pct: 0.06
    hard_stop_pct: 0.06
    take_profit_pct: 0.18
    cool_days: 3
    min_hold_days: 0
    entry_confirm_days: 1
    entry_rank_buffer: 0
    use_inv_vol_weight: true
    score_smoothing_window: 3
    max_cluster_weight: 0.80
    max_position_weight: 0.60
    use_trend_state_budget: true
    trend_budget_bucket: US_EQUITY
    trend_budget_group: RISK_EQUITY
    trend_budget_symbols: [513100.SH, 513500.SH]
    trend_defensive_symbols: [518880.SH, 160723.SZ]
    trend_fast_ma_window: 120
    trend_slow_ma_window: 200
    trend_relative_window: 126
    trend_strong_relative_momentum: 0.00
    trend_weak_relative_momentum: -0.05
    trend_state_budgets:
      strong:
        bucket_cap: 0.80
        group_cap: 0.90
      neutral:
        bucket_cap: 0.60
        group_cap: 0.80
      weak:
        bucket_cap: 0.40
        group_cap: 0.40
    bucket_groups:
      RISK_EQUITY: [CN_EQUITY, HK_EQUITY, US_EQUITY]
    bucket_map:
      160723.SZ: COMMODITY
      513100.SH: US_EQUITY
      159985.SZ: COMMODITY
      513500.SH: US_EQUITY
      518880.SH: COMMODITY
      513130.SH: HK_EQUITY
      510300.SH: CN_EQUITY
      159915.SZ: CN_EQUITY
      513600.SH: HK_EQUITY

backtest:
  initial_cash: 150000
  commission_bps: 13
  slippage_bps: 0
  rebalance: D
  execution: next_open

walk_forward:
  train_months: 36
  validation_months: 6
  test_months: 6
  step_months: 6
  mode: rolling

output_dir: ../outputs/experiments/bigquant_rotation/hybrid_trend_budget
