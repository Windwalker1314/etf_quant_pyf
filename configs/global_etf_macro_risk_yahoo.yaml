universe:
  - symbol: SPY
    name: S&P 500 ETF
    asset_class: us_equity
    currency: USD
  - symbol: QQQ
    name: Nasdaq 100 ETF
    asset_class: us_equity
    currency: USD
  - symbol: IWM
    name: Russell 2000 ETF
    asset_class: us_equity
    currency: USD
  - symbol: EFA
    name: Developed Markets ETF
    asset_class: developed_equity
    currency: USD
  - symbol: EEM
    name: Emerging Markets ETF
    asset_class: emerging_equity
    currency: USD
  - symbol: FXI
    name: China Large-Cap ETF
    asset_class: cn_equity
    currency: USD
  - symbol: GLD
    name: Gold ETF
    asset_class: commodity
    currency: USD
  - symbol: DBC
    name: Broad Commodity ETF
    asset_class: commodity
    currency: USD
  - symbol: TLT
    name: Long Treasury ETF
    asset_class: bond
    currency: USD
  - symbol: IEF
    name: 7-10 Year Treasury ETF
    asset_class: bond
    currency: USD
  - symbol: VNQ
    name: US REIT ETF
    asset_class: real_estate
    currency: USD

data:
  source: yahoo
  path: ../data/raw/global_etf_yahoo_prices.csv
  start: "2006-02-06"
  end: "2026-05-11"
  params:
    sleep_seconds: 0.2

factors: []

strategy:
  name: macro_risk_rotation
  params:
    risk_symbols: [SPY, QQQ, IWM, EFA, EEM, FXI, VNQ]
    defensive_symbols: [IEF, TLT, GLD]
    hold_num: 3
    defensive_hold_num: 2
    momentum_windows: [63, 126, 252]
    risk_ma_window: 200
    breadth_window: 200
    breadth_threshold: 0.55
    risk_score_threshold: 0.03
    crash_momentum_window: 63
    crash_momentum_threshold: -0.04
    volatility_window: 63
    min_risk_momentum: 0.0
    min_defensive_momentum: -1.0
    use_inv_vol_weight: true
    cash_weight_when_defensive: 0.25
    safe_asset: IEF
    macro_data_path: ../data/raw/macro/credit_risk_ratio.csv
    macro_lag_days: 21
    use_macro_filter: true
    yield_curve_col: T10Y2Y
    credit_spread_col: BAMLH0A0HYM2
    financial_conditions_col: NFCI
    fed_funds_col: FEDFUNDS
    min_yield_curve: null
    max_credit_spread: null
    max_credit_spread_change_63d: null
    max_financial_conditions: null
    max_fed_funds_change_252d: null
    macro_trend_col: credit_risk_ratio
    macro_trend_ma_window: 126
    macro_trend_min_gap: -0.01
    macro_trend_min_momentum_63d: null

backtest:
  initial_cash: 150000
  commission_bps: 3
  slippage_bps: 1
  rebalance: M
  execution: next_open

walk_forward:
  train_months: 60
  validation_months: 12
  test_months: 12
  step_months: 12
  mode: rolling

output_dir: ../outputs/global/strategies/macro_risk_rotation_yahoo
