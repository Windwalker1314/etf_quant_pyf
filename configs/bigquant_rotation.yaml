data:
  source: csv
  path: ../data/raw/bigquant_sample_prices.csv
  start: "2020-01-01"
  end: "2026-02-02"

factors:
  - name: bigquant_rotation
    params:
      trend_period: 25
      inv_vol_window: 30
      weight_clip_pct: 0.90

strategy:
  name: bigquant_rotation
  params:
    hold_num: 2
    rebalance_weekday: 4
    score_gap_base: 0.10
    gap_coef: 0.35
    gap_floor: 0.10
    change_threshold: 0.10
    trail_stop_pct: 0.06
    hard_stop_pct: 0.06
    take_profit_pct: 0.40
    cool_days: 3
    use_inv_vol_weight: true
    max_cluster_weight: 0.80

backtest:
  initial_cash: 150000
  commission_bps: 13
  slippage_bps: 0
  rebalance: D
  execution: next_close

output_dir: ../outputs/strategies/bigquant_rotation/default
