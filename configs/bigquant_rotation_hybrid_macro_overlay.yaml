data:
  source: csv
  path: ../data/raw/bigquant_hybrid_prices.csv
  start: "2020-01-01"
  end: "2026-05-11"

factors:
  - name: bigquant_rotation
    params:
      trend_period: 25
      inv_vol_window: 30
      weight_clip_pct: 0.90

strategy:
  name: bigquant_rotation
  params:
    hold_num: 2
    rebalance_weekday: null
    score_gap_base: 0.10
    gap_coef: 0.35
    gap_floor: 0.10
    change_threshold: 0.12
    trail_stop_pct: 0.06
    hard_stop_pct: 0.06
    take_profit_pct: 0.18
    cool_days: 3
    min_hold_days: 0
    entry_confirm_days: 1
    entry_rank_buffer: 0
    use_inv_vol_weight: true
    score_smoothing_window: 3
    max_cluster_weight: 0.80
    use_risk_overlay: true
    risk_symbols:
      - 513100.SH
      - 513500.SH
      - 513130.SH
      - 510300.SH
      - 159915.SZ
      - 513600.SH
    defensive_symbols:
      - 518880.SH
      - 159985.SZ
      - 160723.SZ
    risk_ma_window: 120
    risk_breadth_threshold: 0.50
    risk_momentum_window: 63
    risk_momentum_threshold: -0.03
    defensive_cash_weight: 0.25

backtest:
  initial_cash: 150000
  commission_bps: 13
  slippage_bps: 0
  rebalance: D
  execution: next_open

walk_forward:
  train_months: 36
  validation_months: 6
  test_months: 6
  step_months: 6
  mode: rolling

output_dir: ../outputs/experiments/bigquant_rotation/hybrid_macro_overlay
