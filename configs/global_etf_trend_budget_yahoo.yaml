universe:
  - symbol: SPY
    name: S&P 500 ETF
    asset_class: us_equity
    currency: USD
  - symbol: QQQ
    name: Nasdaq 100 ETF
    asset_class: us_equity
    currency: USD
  - symbol: IWM
    name: Russell 2000 ETF
    asset_class: us_equity
    currency: USD
  - symbol: EFA
    name: Developed Markets ETF
    asset_class: developed_equity
    currency: USD
  - symbol: EEM
    name: Emerging Markets ETF
    asset_class: emerging_equity
    currency: USD
  - symbol: FXI
    name: China Large-Cap ETF
    asset_class: cn_equity
    currency: USD
  - symbol: GLD
    name: Gold ETF
    asset_class: commodity
    currency: USD
  - symbol: DBC
    name: Broad Commodity ETF
    asset_class: commodity
    currency: USD
  - symbol: TLT
    name: Long Treasury ETF
    asset_class: bond
    currency: USD
  - symbol: IEF
    name: 7-10 Year Treasury ETF
    asset_class: bond
    currency: USD
  - symbol: VNQ
    name: US REIT ETF
    asset_class: real_estate
    currency: USD

data:
  source: yahoo
  path: ../data/raw/global_etf_yahoo_prices.csv
  start: "2006-02-06"
  end: "2026-05-11"
  params:
    sleep_seconds: 0.2

factors:
  - name: bigquant_rotation
    params:
      trend_period: 25
      inv_vol_window: 30
      weight_clip_pct: 0.90

strategy:
  name: bigquant_rotation
  params:
    hold_num: 2
    rebalance_weekday: null
    score_gap_base: 0.10
    gap_coef: 0.35
    gap_floor: 0.10
    change_threshold: 0.12
    trail_stop_pct: 0.06
    hard_stop_pct: 0.06
    take_profit_pct: 0.18
    cool_days: 3
    use_inv_vol_weight: true
    score_smoothing_window: 3
    max_cluster_weight: 1.00
    max_position_weight: 0.60
    use_trend_state_budget: true
    trend_budget_bucket: US_EQUITY
    trend_budget_group: RISK_EQUITY
    trend_budget_symbols: [QQQ, SPY]
    trend_defensive_symbols: [IEF, GLD]
    trend_fast_ma_window: 120
    trend_slow_ma_window: 200
    trend_relative_window: 126
    trend_strong_relative_momentum: 0.00
    trend_weak_relative_momentum: -0.05
    trend_state_budgets:
      strong:
        bucket_cap: 0.70
        group_cap: 0.90
      neutral:
        bucket_cap: 0.60
        group_cap: 0.80
      weak:
        bucket_cap: 0.40
        group_cap: 0.40
    specified_etfs:
      - SPY
      - QQQ
      - IWM
      - EFA
      - EEM
      - FXI
      - GLD
      - DBC
      - TLT
      - IEF
      - VNQ
    clusters:
      US: [SPY, QQQ, IWM, VNQ]
      GLOBAL: [EFA, EEM, FXI]
      ALT: [GLD, DBC]
      BOND: [TLT, IEF]
    bucket_groups:
      RISK_EQUITY: [US_EQUITY, GLOBAL_EQUITY, CN_EQUITY, REAL_ESTATE]
    bucket_map:
      SPY: US_EQUITY
      QQQ: US_EQUITY
      IWM: US_EQUITY
      EFA: GLOBAL_EQUITY
      EEM: GLOBAL_EQUITY
      FXI: CN_EQUITY
      GLD: COMMODITY
      DBC: COMMODITY
      TLT: BOND_OR_CASH
      IEF: BOND_OR_CASH
      VNQ: REAL_ESTATE

backtest:
  initial_cash: 150000
  commission_bps: 3
  slippage_bps: 1
  rebalance: D
  execution: next_open

walk_forward:
  train_months: 60
  validation_months: 12
  test_months: 12
  step_months: 12
  mode: rolling

output_dir: ../outputs/global/strategies/trend_budget_yahoo
